<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contato - Portfólio</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2Y4V1sFZC9sZ0s7Mggv0SNYb8r7ZrZ6N6Vv0gq9qU5J9nC6b8K7YkdU9wQ=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="assets/js/script.js" defer></script>
  </head>
  <body>
    <a class="skip-to-content" href="#conteudo">Pular para o conteúdo</a>

    <nav class="sidebar" aria-label="Navegação lateral" id="sidebar" data-sidebar>
      <a href="index.html" class="logo">FaFeJAVA</a>

      <ul class="menu-links">
        <li><a href="index.html"><i class="fa-solid fa-house"></i> Início</a></li>
        <li><a href="sobre.html"><i class="fa-solid fa-user"></i> Sobre</a></li>
        <li><a href="contato.html" aria-current="page"><i class="fa-solid fa-envelope"></i> Contato</a></li>
      </ul>

      <div class="sidebar-social" aria-label="Minhas redes">
        <div class="social-links">
          <a class="social-btn" href="https://github.com/Fabferna" target="_blank" rel="noopener" aria-label="Abrir GitHub de Fabio">
            <i class="fa-brands fa-github" aria-hidden="true"></i>
            <span>GitHub</span>
          </a>
          <a class="social-btn" href="https://www.linkedin.com/in/fabio-fernandes-javarrotti-j%C3%BAnior-372172120" target="_blank" rel="noopener" aria-label="Abrir LinkedIn de Fabio">
            <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i>
            <span>LinkedIn</span>
          </a>
        </div>
      </div>
    </nav>

    <button class="mobile-menu-button"
            aria-label="Abrir menu"
            aria-controls="sidebar"
            aria-expanded="false"
            data-menu-button>
      <i class="fa-solid fa-bars" aria-hidden="true"></i>
    </button>

    <main id="conteudo" class="content">
      <header class="page-header">
        <h1>Contato</h1>
        <p>Vamos conversar? Preencha o formulário abaixo.</p>
      </header>

      <section class="contact">
        <form class="contact-form" novalidate>
          <div class="form-group">
            <label for="nome">Seu nome</label>
            <input id="nome" name="nome" autocomplete="name" required />
          </div>
          <div class="form-group">
            <label for="email">Seu e-mail</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="mensagem">Sua mensagem</label>
            <textarea id="mensagem" name="mensagem" rows="6" required></textarea>
          </div>
          <button type="submit" class="btn">Enviar</button>
        </form>
        <p class="form-notice"><small>(Envio real pode ser ligado a um backend/API futuramente)</small></p>
      </section>
    </main>
  </body>
</html>
